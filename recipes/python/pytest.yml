name: Test

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - ".github/workflows/pytest.yml"
  push:
    paths:
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - ".github/workflows/pytest.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install .
      - name: Pytest
        run: pytest --verbose
